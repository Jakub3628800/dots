# ===============================================================================
# Generated by pre-commit-template v0.1.1
# Repository: https://github.com/Jakub3628800/pre-commit-template
# Generated: 2025-12-21T09:35:34Z
#
# Detected technologies: docker, github-actions
#
# To regenerate: pre-commit-template [--interactive]
# ===============================================================================
repos:
  # =====================
  # Base hooks
  # =====================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: trailing-whitespace
      name: Trim trailing whitespace
    - id: end-of-file-fixer
      name: Fix end of files
    - id: check-yaml
      name: Check YAML
    - id: check-json
      name: Check JSON
    - id: check-toml
      name: Check TOML
    - id: check-added-large-files
      name: Check for added large files
    - id: check-merge-conflict
      name: Check for merge conflict strings
    - id: detect-private-key
      name: Detect private keys
    - id: detect-aws-credentials
      name: Detect AWS credentials
      args: [--allow-missing-credentials]
    - id: no-commit-to-branch
      name: Prevent commits to main/master
      always_run: false
      args: [--branch, main, --branch, master]
    - id: check-case-conflict
      name: Check for case conflicts
    - id: check-executables-have-shebangs
      name: Check executables have shebangs

  # =====================
  # Docker hooks
  # =====================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
    - id: hadolint-docker
      name: Lint Dockerfiles with hadolint
      files: (^|/)Dockerfile$
      types: [dockerfile]
      args: [--ignore, DL3008]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
    - id: shellcheck
      name: Lint shell scripts with ShellCheck
      files: (^|/)([^/]*\.sh|install-nvim\.sh|screencopy|screensave|pass-type|\.bash_aliases|\.profile)$

  - repo: local
    hooks:
    - id: zsh-syntax
      name: Check zsh syntax
      entry: zsh -n
      language: system
      files: (^|/)(\.zshrc|.*\.zsh)$

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.5.2
    hooks:
    - id: stylua
      name: Format Lua with StyLua
      files: ^nvim/home/.+\.lua$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-added-large-files
      name: Check for large files (Docker builds)
      args: ['--maxkb=1000']

  # =====================
  # GitHub Actions hooks
  # =====================
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
    - id: actionlint
      name: Lint GitHub Actions workflows
      description: Lint GitHub Actions workflow files
      files: '^\.github/workflows/.*\.(yml|yaml)$'
